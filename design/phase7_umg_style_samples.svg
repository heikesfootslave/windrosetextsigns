<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6c93b2"/>
      <stop offset="0.42" stop-color="#b7c7d0"/>
      <stop offset="1" stop-color="#8f7a55"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#24272a" stop-opacity="0.93"/>
      <stop offset="1" stop-color="#111214" stop-opacity="0.91"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111316" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#050607" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d9cfb4"/>
      <stop offset="0.5" stop-color="#f0e7cf"/>
      <stop offset="1" stop-color="#b8aa89"/>
    </linearGradient>
    <linearGradient id="redPaint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7f1713"/>
      <stop offset="0.55" stop-color="#b51f19"/>
      <stop offset="1" stop-color="#74120f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
    <style>
      .title { font-family: Georgia, Cambria, serif; font-weight: 700; letter-spacing: 1px; fill: #e8e0ce; }
      .body { font-family: "Segoe UI", Arial, sans-serif; fill: #d5d1ca; }
      .muted { font-family: "Segoe UI", Arial, sans-serif; fill: #a9a5a0; }
      .key { font-family: Georgia, Cambria, serif; font-weight: 700; fill: #26231e; }
      .label { font-family: Georgia, Cambria, serif; font-weight: 700; fill: #f1eadb; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <g opacity="0.25">
    <path d="M0 675 C220 615 340 705 510 646 C710 575 860 675 1030 602 C1220 520 1400 610 1600 548 L1600 900 L0 900 Z" fill="#4d3c2d"/>
    <path d="M0 265 C220 210 305 300 475 240 C710 160 830 265 1010 205 C1230 130 1365 210 1600 145 L1600 0 L0 0 Z" fill="#173c42"/>
  </g>
  <rect width="1600" height="900" fill="#090a0c" opacity="0.32"/>

  <text x="80" y="88" class="title" font-size="42">WindroseTextSigns UMG Style Samples</text>
  <text x="82" y="125" class="muted" font-size="20">Three directions for the F8 sign editor, aligned to Windrose menu language and feasible with runtime UMG widgets.</text>

  <!-- Sample 1 -->
  <g transform="translate(90 190)" filter="url(#shadow)">
    <rect x="0" y="0" width="430" height="430" rx="2" fill="url(#panel)" stroke="#4a4946" stroke-width="2"/>
    <rect x="8" y="8" width="414" height="414" rx="1" fill="none" stroke="#2b2d2f" stroke-width="1"/>
    <text x="215" y="50" class="title" font-size="31" text-anchor="middle">Sign Text</text>
    <path d="M13 76 C85 69 175 81 248 72 C312 65 355 76 417 69" fill="none" stroke="#bdb39a" stroke-width="2" opacity="0.72"/>
    <rect x="55" y="105" width="320" height="175" rx="1" fill="url(#inner)" stroke="#69645a" stroke-width="1.5"/>
    <rect x="62" y="113" width="306" height="159" fill="#0b0c0d" opacity="0.30"/>
    <text x="77" y="147" class="body" font-size="25">Rum</text>
    <text x="77" y="184" class="body" font-size="25">Spice</text>
    <text x="77" y="221" class="body" font-size="25">Repairs</text>
    <rect x="55" y="311" width="320" height="48" rx="1" fill="#22221f" stroke="#777064" stroke-width="1.5"/>
    <rect x="65" y="319" width="48" height="32" rx="3" fill="#ebe3ce"/>
    <text x="89" y="342" class="key" font-size="22" text-anchor="middle">↵</text>
    <text x="126" y="341" class="muted" font-size="17">Apply</text>
    <rect x="217" y="319" width="54" height="32" rx="3" fill="#ebe3ce"/>
    <text x="244" y="342" class="key" font-size="19" text-anchor="middle">Esc</text>
    <text x="284" y="341" class="muted" font-size="17">Cancel</text>
    <text x="215" y="397" class="label" font-size="20" text-anchor="middle">Sample A: compact menu panel</text>
  </g>

  <!-- Sample 2 -->
  <g transform="translate(585 190)" filter="url(#shadow)">
    <rect x="0" y="0" width="430" height="430" rx="2" fill="url(#panel)" stroke="#393b3d" stroke-width="2"/>
    <path d="M25 47 L405 47" stroke="#c7baa0" stroke-width="2" opacity="0.68"/>
    <path d="M0 26 C80 12 130 32 210 20 C290 8 340 28 430 13 L430 68 C350 78 280 60 205 73 C125 86 72 64 0 80 Z" fill="#16191c" opacity="0.95"/>
    <text x="215" y="50" class="title" font-size="30" text-anchor="middle">Edit Wooden Label</text>
    <path d="M42 116 L388 104 L377 297 L52 305 Z" fill="url(#inner)" stroke="#80786a" stroke-width="2"/>
    <path d="M53 128 L377 117" stroke="#e4d9bd" stroke-width="1" opacity="0.35"/>
    <path d="M61 264 L365 256" stroke="#6e695f" stroke-width="1" opacity="0.45"/>
    <text x="72" y="154" class="body" font-size="24">Gems</text>
    <text x="72" y="191" class="body" font-size="24">Gold</text>
    <text x="72" y="228" class="body" font-size="24">Maps</text>
    <rect x="68" y="324" width="110" height="40" rx="1" fill="url(#paper)" stroke="#6e603f" stroke-width="1"/>
    <text x="123" y="351" class="key" font-size="19" text-anchor="middle">Apply</text>
    <rect x="194" y="324" width="90" height="40" rx="1" fill="#242421" stroke="#756f63" stroke-width="1"/>
    <text x="239" y="351" class="muted" font-size="18" text-anchor="middle">Clear</text>
    <rect x="300" y="324" width="90" height="40" rx="1" fill="#242421" stroke="#756f63" stroke-width="1"/>
    <text x="345" y="351" class="muted" font-size="18" text-anchor="middle">Cancel</text>
    <text x="215" y="397" class="label" font-size="20" text-anchor="middle">Sample B: full editor dialog</text>
  </g>

  <!-- Sample 3 -->
  <g transform="translate(1080 190)" filter="url(#shadow)">
    <rect x="0" y="0" width="430" height="430" rx="2" fill="url(#panel)" stroke="#3d3f40" stroke-width="2"/>
    <path d="M0 120 C80 103 135 130 215 115 C300 100 345 128 430 105 L430 166 C345 178 293 154 210 170 C130 185 72 160 0 178 Z" fill="url(#redPaint)" opacity="0.85"/>
    <text x="215" y="63" class="title" font-size="30" text-anchor="middle">Label: Text</text>
    <rect x="45" y="123" width="340" height="50" rx="1" fill="#111214" opacity="0.58" stroke="#d5c5a2" stroke-width="1"/>
    <text x="215" y="157" class="body" font-size="24" text-anchor="middle">Captain's Chest</text>
    <rect x="55" y="213" width="320" height="84" rx="1" fill="#111214" opacity="0.74" stroke="#6d675d" stroke-width="1.5"/>
    <text x="75" y="246" class="muted" font-size="18">Type label text, then press Enter.</text>
    <text x="75" y="276" class="muted" font-size="18">Shift+Enter inserts a line.</text>
    <g transform="translate(83 326)">
      <rect x="0" y="0" width="46" height="30" rx="3" fill="#ebe3ce"/>
      <text x="23" y="22" class="key" font-size="17" text-anchor="middle">Esc</text>
      <text x="60" y="22" class="muted" font-size="17">Close</text>
      <rect x="165" y="0" width="46" height="30" rx="3" fill="#ebe3ce"/>
      <text x="188" y="22" class="key" font-size="20" text-anchor="middle">↵</text>
      <text x="225" y="22" class="muted" font-size="17">Apply</text>
    </g>
    <text x="215" y="397" class="label" font-size="20" text-anchor="middle">Sample C: world overlay ribbon</text>
  </g>

  <rect x="0" y="0" width="1600" height="900" filter="url(#grain)" opacity="0.55"/>
</svg>
