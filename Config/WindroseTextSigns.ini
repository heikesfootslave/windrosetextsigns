[General]
WTS_ENABLED=true
WTS_HOTKEY=F8
WTS_MAX_TARGET_DISTANCE=1000
WTS_MIN_VIEW_DOT=0.92
WTS_BRIDGE_SERVER_HOST=auto
WTS_BRIDGE_UDP_PORT=45801
WTS_BRIDGE_UPNP_MODE=auto
WTS_BRIDGE_UPNP_ENABLED=true
WTS_DESTROY_CONFIRM_TTL_SEC=10

[Debug]
# Legacy pre-0.1.2 test6/buildmenu probe triggers were removed.
# Keep these diagnostics off unless actively investigating issues.
WTS_STATIC_CONSTRUCT_PROBE=false
WTS_PROCESS_EVENT_PROBE=false
WTS_PHASE5_PLACEMENT_PROBE=false
WTS_PHASE5_BUILD_MENU_SELECTION_PROBE=false
WTS_VERBOSE_LOG=false
WTS_BEHAVIOR_TRACE_ENABLED=false

# LocalClient visual verification / motion reapply debug controls.
WTS_VISUAL_VERIFY_DEBUG_FORCE_REAPPLY=false
WTS_LOCALCLIENT_MOTION_REAPPLY_ENABLED=true
WTS_LOCALCLIENT_CONTROLLER_PROBE_INTERVAL_SEC=0.2

# World text rendering controls.
WTS_HIDE_NATIVE_LABEL_ICON=true
WTS_WORLD_TEXT_FONT_ENABLED=false
WTS_WORLD_TEXT_FONT_ASSET=none
WTS_WORLD_TEXT_FONT_NAME_HINT=
WTS_WORLD_TEXT_FONT_NATIVE_FALLBACK=false
WTS_WORLD_TEXT_FONT_INVENTORY_PROBE=false
WTS_WORLD_TEXT_FONT_INVENTORY_MAX=80

# Optional relay transport controls.
WTS_RELAY_ENABLED=false
WTS_RELAY_BASE_URL=
WTS_RELAY_SHARED_SECRET=
WTS_RELAY_POLL_INTERVAL_MS=5000

# Native transport / marker diagnostics.
WTS_LABEL_TEXT_VISUAL_DIAGNOSTICS=false
WTS_NATIVE_TRANSPORT_INVENTORY_PROBE=false
WTS_NATIVE_TRANSPORT_INVENTORY_MAX=120
WTS_NATIVE_TRANSPORT_MARKER_INVENTORY_MAX=200

# Player marker replication probe controls.
WTS_PLAYER_MARKER_REPLICATION_PROBE=false
WTS_PLAYER_MARKER_REPLICATION_PROBE_START=action
WTS_PLAYER_MARKER_REPLICATION_PROBE_ACTION_TOKENS=melee,attack,weapon,swing,ability,combat,primaryfire,fire,dodge,jump
WTS_PLAYER_MARKER_REPLICATION_PROBE_LOG_TOKENS=R5LogMeleeAbility,RuleRequestServer,R5BLPlayerInWorld_AddUserMarkerRule,R5BLPlayerInWorld_UpdateUserMarkerRule
WTS_PLAYER_MARKER_REPLICATION_PROBE_SECONDS=180
WTS_PLAYER_MARKER_REPLICATION_PROBE_INTERVAL_MS=1500
WTS_PLAYER_MARKER_REPLICATION_PROBE_MAX_OBJECTS=160
WTS_PLAYER_MARKER_REPLICATION_PROBE_MAX_FIELDS=24
WTS_PLAYER_MARKER_REPLICATION_PROBE_MAX_DELTAS=120
