[General]
WTS_ENABLED=true
WTS_HOTKEY=F8
WTS_BRIDGE_SERVER_HOST=auto
WTS_BRIDGE_UDP_PORT=45801
WTS_BRIDGE_UPNP_MODE=auto
WTS_BRIDGE_UPNP_ENABLED=true

[Debug]
# Runtime diagnostics
WTS_MAX_TARGET_DISTANCE=1000
WTS_MIN_VIEW_DOT=0.92
WTS_DESTROY_CONFIRM_TTL_SEC=10
WTS_BEHAVIOR_TRACE_ENABLED=false
WTS_F8_LATENCY_BREAKDOWN_ENABLED=true
WTS_CREATE_NULL_SHORT_RETRY_ENABLED=true
WTS_CREATE_NULL_RETRY_DELAYS_MS=250,750,1500

# LocalClient visual verification / motion reapply controls
WTS_VISUAL_VERIFY_DEBUG_FORCE_REAPPLY=false
WTS_LOCALCLIENT_MOTION_REAPPLY_ENABLED=true
WTS_LOCALCLIENT_CONTROLLER_PROBE_INTERVAL_SEC=0.2

# World text rendering controls
WTS_HIDE_NATIVE_LABEL_ICON=true
WTS_WORLD_TEXT_FONT_ENABLED=false
WTS_WORLD_TEXT_FONT_ASSET=none
WTS_WORLD_TEXT_FONT_NAME_HINT=
WTS_WORLD_TEXT_FONT_NATIVE_FALLBACK=false
WTS_WORLD_TEXT_FONT_INVENTORY_PROBE=false
WTS_WORLD_TEXT_FONT_INVENTORY_MAX=80
# Autosize/row layout defaults are selected at runtime based on:
# 0_WindroseTextSigns_RDFOverride_P.pak present or not present.

# Native transport diagnostics
WTS_LABEL_TEXT_VISUAL_DIAGNOSTICS=false
WTS_NATIVE_TRANSPORT_INVENTORY_PROBE=false
WTS_NATIVE_TRANSPORT_INVENTORY_MAX=120
WTS_NATIVE_TRANSPORT_MARKER_INVENTORY_MAX=200
